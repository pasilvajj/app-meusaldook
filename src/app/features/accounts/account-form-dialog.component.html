<h2 mat-dialog-title class="acc-dialog-title">
  <span>Nova conta</span>
  <button mat-icon-button type="button" mat-dialog-close class="acc-dialog-close" aria-label="Fechar">
    <mat-icon>close</mat-icon>
  </button>
</h2>

<mat-dialog-content class="acc-dialog-body">
  <form [formGroup]="form" (ngSubmit)="save()" id="acc-create-form">
    <div class="acc-dialog-row2">
      <div class="acc-type-cell">
        <mat-form-field appearance="outline" class="acc-field acc-field--grow">
          <mat-label>Tipo</mat-label>
          <mat-select formControlName="accountType" required>
            @for (opt of typeOptions; track opt.id) {
              <mat-option [value]="opt.id">{{ opt.label }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        <button
          mat-icon-button
          type="button"
          tabindex="-1"
          class="acc-help-btn"
          matTooltip="Conta corrente, cartão de crédito, dinheiro ou outros activos (MVP local)."
          aria-label="Ajuda sobre tipo de conta"
        >
          <mat-icon>help_outline</mat-icon>
        </button>
      </div>

      <mat-form-field appearance="outline" class="acc-field">
        <mat-label>Moeda</mat-label>
        <mat-select formControlName="currency">
          <mat-option value="BRL">🇧🇷 Real (R$)</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="acc-field acc-field--full">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" required maxlength="120" autocomplete="off" />
      <mat-icon matSuffix class="acc-name-suffix" aria-hidden="true">savings</mat-icon>
      @if (form.controls.name.hasError('required') && form.controls.name.touched) {
        <mat-error>Indica um nome para a conta</mat-error>
      }
    </mat-form-field>

    <div class="acc-extra-toggle">
      <button type="button" mat-stroked-button class="acc-extra-btn" (click)="toggleAdvanced()">
        Configurações adicionais
      </button>
    </div>

    @if (showAdvanced()) {
      <div class="acc-advanced">
        <mat-form-field appearance="outline" class="acc-field acc-field--full">
          <mat-label>Saldo inicial (opcional)</mat-label>
          <span matTextPrefix class="acc-prefix">R$&nbsp;</span>
          <input matInput type="number" formControlName="initialBalance" min="0" step="0.01" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="acc-field acc-field--full">
          <mat-label>Notas</mat-label>
          <textarea matInput formControlName="notes" rows="2" maxlength="500"></textarea>
        </mat-form-field>
      </div>
    }
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="acc-dialog-actions">
  <button
    mat-flat-button
    color="primary"
    type="submit"
    form="acc-create-form"
    class="acc-save-btn"
    [disabled]="form.invalid || saving()"
  >
    Salvar
    <mat-icon iconPositionEnd>add</mat-icon>
  </button>
</mat-dialog-actions>
