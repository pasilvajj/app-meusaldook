<div class="auth-wrap">
  <mat-card>
    <mat-card-title>Iniciar sessão</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="username" />
          @if (form.controls.email.touched && form.controls.email.invalid) {
            <mat-error>Email inválido</mat-error>
          }
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Palavra-passe</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          @if (form.controls.password.touched && form.controls.password.invalid) {
            <mat-error>Mínimo 8 caracteres</mat-error>
          }
        </mat-form-field>
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Entrar</button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a mat-button routerLink="/auth/register">Criar conta</a>
    </mat-card-actions>
  </mat-card>
</div>
